# YK-VOS 前端（vben web-ele 静态站）nginx 配置
# 与前端 .env.production 的 VITE_GLOB_API_URL=/admin-api 对应：
#   浏览器同源自 yk-frontend:80 访问，/admin-api 由本配置反代到后端容器内网地址。
server {
    listen 80;
    server_name _;

    # 使用 docker 内置 DNS，按请求实时解析 upstream（backend 容器重建换 IP 也不 502）。
    # ⚠️ 不要用字面量 http://backend:48080，否则 nginx 仅在启动时解析一次，
    #    backend 重建换 IP 后 nginx 仍连旧 IP -> Connection refused (502)。
    resolver 127.0.0.11 valid=5s ipv6=off;
    set $backend "backend:48080";

    root /usr/share/nginx/html;
    index index.html;

    # 静态压缩
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # 带 hash 的静态资源长期缓存
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # 后端 API 反代（vben 的 /admin-api -> yudao 后端 :48080）
    # ⚠️ 架构核对：yudao 后端通过 PathMatchConfigurer 在运行时动态为所有管理端控制器加上了 /admin-api 前缀，
    #    因此后端本身监听的真实路由即为 /admin-api/...。
    # ✅ 修复：Nginx 转发时必须【保留】/admin-api 前缀，直接透明代理，否则后端会因为找不到路由抛出 404，或者因未匹配安全白名单被拦截返回 401。
    location ~ ^/admin-api/ {
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # 微信/第三方回调等可能用到 /mp/open、/pay/notify 等，一并反代到后端
    location ~ ^/(mp/open|pay/notify|ai/image/midjourney/notify)/? {
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA 兜底：其余请求回退 index.html（vben 用 hash 路由，通常只命中 /）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
