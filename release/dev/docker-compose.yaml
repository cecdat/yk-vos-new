# =====================================================================
# YK-VOS 测试环境 — 合并编排（数据底座 + 应用层前后端）
# 适用拓扑（见 docs/VOS同步Agent规格.md §3.5）：
#   VOS 服务器有公网；本机(平台部署测试服务器)「没有公网端口」。
#   -> 每个 VOS 节点各跑一个 agent，在 VOS 本机起 HTTP 拉取端点(:5233)，
#      平台侧 pull_client / 监控页 出站去拉。
#   -> 拉回的话单落本机 ClickHouse；可选经本机 Kafka 中继以验证生产消费链路。
# 本 compose 在「数据底座」基础上，新增「应用层」：
#   - MySQL 8（yudao 业务库 ykvos）+ Redis（yudao 缓存）
#   - backend（yudao-server.jar，端口 48080，API 前缀 /admin-api）
#   - frontend（nginx 托管 vben web-ele 静态站，端口 3000，反代 /admin-api -> backend）
# 镜像使用用户指定的 docker.1ms.run 镜像源（已对齐版本）。
#   若某镜像拉取失败，去掉 docker.1ms.run/ 前缀改用官方源即可。
# agent 不在本 compose 内——它必须跑在 VOS 服务器本机（就近读 VOS MySQL）。
# =====================================================================

networks:
  yknet:
    driver: bridge

# 数据全部落在本地目录（release/dev/data/），不挂载命名卷（符合需求：全部映射到本地目录）。
# 初始化由 init/ 下的脚本在容器健康后自动执行（见 clickhouse-init / kafka-init 服务）。
# 数据目录已加入 .gitignore（运行时产物，不入库）。

services:
  # ============ 数据底座 ============
  # ── ClickHouse：ODS/DWS 分析库 ──
  clickhouse:
    image: docker.1ms.run/clickhouse/clickhouse-server:latest
    container_name: yk-clickhouse
    restart: unless-stopped
    # 不对外映射：容器内其他服务用 http://clickhouse:8123 / clickhouse:9000 直连即可。
    # 如需本机 DBeaver 临时调试，可临时加： ports: ["18123:8123"]
    expose:
      - "8123"
      - "9000"
    environment:
      CLICKHOUSE_DB: ykvos_ch
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""        # 测试环境留空；生产务必设强密码
      CLICKHOUSE_DEFAULT_ACCESS_LEVEL: 040
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      # 本地目录持久化（不用命名卷）
      - ./data/clickhouse:/var/lib/clickhouse
      # 初始化 SQL（只读挂载给 init 容器用）
      - ./clickhouse:/sql:ro
      # 显式覆盖默认用户的空密码配置，防止新版镜像自动生成随机密码
      - ./clickhouse/users.d/default-password.xml:/etc/clickhouse-server/users.d/default-password.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse", "client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [yknet]

  # ── Kafka：agent 推送目标（推送模式：agent 出站直推 vos.cdr.live）──
  # 双 listener：INTERNAL(kafka:9092) 供容器内 ClickHouse Kafka 引擎消费；
  #            EXTERNAL(:3001) 供 VOS 本机 agent 出站连入 —— 这是推送模式下唯一要对 VOS 开放的端口（host 映射 3001）。
  # ⚠️ EXTERNAL 的 advertised 地址必须是「VOS 的 agent 能连到的服务端 IP/域名」，
  #    经 .env 的 YK_KAFKA_ADVERTISED_HOST 注入（默认 120.226.208.2 = 本部署服务端对 VOS 暴露地址；需改在 .env 覆盖）。
  kafka:
    image: docker.1ms.run/bitnami/kafka:3.4.1
    container_name: yk-kafka
    restart: unless-stopped
    user: root
    ports:
      - "3001:3001"   # EXTERNAL：VOS agent 推送入口（唯一对外的 Kafka 端口，host 映射 3001）
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:3001
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://${YK_KAFKA_ADVERTISED_HOST:-120.226.208.2}:3001
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - ./data/kafka:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks: [yknet]

  # ── 数据端初始化：ClickHouse 建表（ODS + Kafka MV）──
  clickhouse-init:
    image: docker.1ms.run/clickhouse/clickhouse-server:latest
    container_name: yk-clickhouse-init
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./clickhouse:/sql:ro
      - ./init:/init:ro
    entrypoint: ["/bin/bash", "/init/init-clickhouse.sh"]
    networks: [yknet]

  # ── 数据端初始化：Kafka 建 topic（vos.cdr.live）──
  kafka-init:
    image: docker.1ms.run/bitnami/kafka:3.4.1
    container_name: yk-kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./init:/init:ro
    entrypoint: ["/bin/bash", "/init/init-kafka.sh"]
    networks: [yknet]

  # ── 应用端初始化：MySQL 全量建库（自愈）──
  # 为何需要它：Docker 官方 MySQL 的 /docker-entrypoint-initdb.d 仅在
  # 「数据目录首次为空」时执行一次；而 compose 用 bind 挂载 ./data/mysql，
  # `docker compose down` 不会删该目录，导致复用卷时建表 SQL 被整段跳过，
  # 仅留下 MYSQL_DATABASE 建的空库 ykvos —— 表现就是「所有表都不存在」。
  # 本服务在 mysql 健康后跑 init-mysql.sh：库里缺哪张表就补齐哪张
  # （ykvos.sql/vos.sql 含 DROP TABLE，用哨兵表守护不误清数据），
  # 已存在的表跳过。因此无论卷是空还是被复用，docker compose up -d 都能自愈。
  # 手动补跑：docker compose exec mysql bash /init/init-mysql.sh
  mysql-init:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/mysql:8.0
    container_name: yk-mysql-init
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/sql/mysql:/docker-entrypoint-initdb.d:ro
      - ./init:/init:ro
    entrypoint: ["/bin/bash", "/init/init-mysql.sh"]
    networks: [yknet]

  # ── 监控页：数据链路健康 / 节点 lag（docker 形式运行，FROM scratch 静态二进制）──
  monitor:
    build:
      context: ./monitor
    container_name: yk-monitor
    restart: unless-stopped
    # 不对外映射：运维看链路健康时临时加 ports:["18088:8088"]，或后续反代进前端 nginx。
    expose:
      - "8088"
    environment:
      NODES: "${NODES:-vos1=http://<VOS1公网IP>:5233,vos2=http://<VOS2公网IP>:5233}"
      CLICKHOUSE_URL: "${CLICKHOUSE_URL:-http://clickhouse:8123}"
      CH_TABLE: "${CH_TABLE:-vos_cdr_ods}"
      MONITOR_TOKEN: "${MONITOR_TOKEN:-}"
      PORT: "${PORT:-8088}"
      CACHE_SECONDS: "${CACHE_SECONDS:-8}"
    depends_on:
      - clickhouse
    networks: [yknet]

  # ============ 应用层（前后端） ============
  # ── MySQL 8：yudao 业务库（ykvos）──
  mysql:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/mysql:8.0
    container_name: yk-mysql
    restart: unless-stopped
    # 不对外映射：仅 backend 容器内用 mysql:3306 连接。需本机调试临时加 ports:["3306:3306"]。
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "ykvos"
      TZ: "Asia/Shanghai"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./data/mysql:/var/lib/mysql
      # 首次启动自动导入建库 SQL（yudao 官方初始化脚本）
      - ./backend/sql/mysql:/docker-entrypoint-initdb.d:ro
      # VOS 数据初始化脚本（手动补建/重跑：docker compose exec mysql bash /init/init-mysql-vos.sh）
      - ./init:/init:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks: [yknet]

  # ── Redis：yudao 缓存/会话（database 1）──
  redis:
    image: docker.1ms.run/redis:7
    container_name: yk-redis
    restart: unless-stopped
    # 不对外映射：仅 backend 容器内用 redis:6379 连接。
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [yknet]

  # ── 后端：yudao-server.jar（端口 48080，API 前缀 /admin-api）──
  backend:
    image: pinny3/openjdk21:latest
    container_name: yk-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # 不对外映射：前端 nginx 在容器内反代 /admin-api -> backend:48080。需直连调试临时加 ports:["48080:48080"]。
    expose:
      - "48080"
    volumes:
      # 构建好的 jar（由 package_server.sh 拷入 backend/yudao-server/target/）
      - ./backend/yudao-server/target/yudao-server.jar:/yudao-server/app.jar:ro
      - ./data/backend-logs:/root/logs
    environment:
      TZ: "Asia/Shanghai"
      JAVA_OPTS: "-Xms512m -Xmx1024m -Djava.security.egd=file:/dev/./urandom"
      # 覆盖 yudao 默认数据源指向本 compose 内的 mysql/redis（默认是 localhost:3306）
      SPRING_PROFILES_ACTIVE: "dev"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: "jdbc:mysql://mysql:3306/ykvos?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: "root"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: "123456"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_SLAVE_URL: "jdbc:mysql://mysql:3306/ykvos?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_SLAVE_USERNAME: "root"
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_SLAVE_PASSWORD: "123456"
      SPRING_DATA_REDIS_HOST: "redis"
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_DATABASE: "1"
      # 覆盖 application-dev.yaml 里写死的 127.0.0.1:9092（容器内指后端自己，连不上）。
      # 后端在 docker 网络内，走 Kafka 的 INTERNAL listener kafka:9092（与 ClickHouse 引擎同）。
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      # 验证码（滑动拼图）右下角水印：覆盖 application.yaml 的 aj.captcha.water-mark（默认芋道源码）
      AJ_CAPTCHA_WATER_MARK: "云客VOS数据中台"
    # ⚠️ 必须用 shell 形式展开 JAVA_OPTS：compose 的 ${VAR} 插值只在解析期取值，
    # 取不到 environment: 块里的 JAVA_OPTS，会把整串当成一个带空格的 argv 元素传给 java，
    # 导致 "Invalid initial heap size: -Xms512m -Xmx1024m ..."。改用 sh -c 展开 + exec 让 java 成 PID1。
    command: ["sh", "-c", "exec java $$JAVA_OPTS -jar /yudao-server/app.jar"]
    networks: [yknet]

  # ── 前端：nginx 托管 vben web-ele 静态站（端口 3000）──
  frontend:
    image: docker.1ms.run/nginx:latest
    container_name: yk-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      # 构建好的前端静态产物（由 package_server.sh 拷入 frontend/dist/）
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [yknet]
